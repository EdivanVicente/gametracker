<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTracker Pro — Explorar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme.js"></script>

  <script src="assets/js/auth-check.js"></script>
</head>
<body>

  <nav class="navbar navbar-expand-lg gt-navbar sticky-top py-3">
    <div class="container-fluid gt-container-fluid px-3 px-md-4">
      <a class="navbar-brand gt-brand" href="dashboard.html">
        <i class="bi bi-joystick" style="color: var(--gt-accent);"></i>
        GameTracker <span class="gt-brand-mark">Pro</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gtNavContent"
              aria-controls="gtNavContent" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="gtNavContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Meu Catálogo</a></li>
          <li class="nav-item"><a class="nav-link active" href="explore.html">Explorar</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Relatórios</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <button class="gt-theme-toggle" type="button" onclick="toggleTheme()" aria-label="Alternar tema claro/escuro" title="Alternar tema">
            <i class="bi bi-sun"></i>
          </button>
          <button class="btn btn-outline-danger" onclick="logout()">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid gt-container-fluid px-3 px-md-4 py-4">
    <section class="gt-toolbar p-3 mb-4">
      <div class="input-group">
        <span class="input-group-text bg-transparent border-0" style="background-color: var(--gt-surface-raised) !important; border-color: var(--gt-border) !important;">
          <i class="bi bi-search text-white-50"></i>
        </span>
        <input type="text" class="form-control border-0 border-start-0" id="explore-input"
               placeholder="Digite o nome de um jogo para explorar (ex: Hollow Knight)">
        <button class="btn btn-gt-primary" type="button" id="explore-btn">Explorar</button>
      </div>
    </section>

    <section id="explore-result">
      <p class="text-white-50 text-center py-5">Busque um jogo para ver detalhes e um vídeo de gameplay.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/explore.js"></script>
</body>
</html>
