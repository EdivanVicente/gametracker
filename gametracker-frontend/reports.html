<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTracker Pro — Relatórios</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme.js"></script>

  <script src="assets/js/auth-check.js"></script>

  <style>
    .gt-bar-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; }
    .gt-bar-label { width: 130px; font-size: 0.8rem; color: var(--gt-text-muted); flex-shrink: 0; }
    .gt-bar-track { flex: 1; height: 10px; background: var(--gt-surface-raised); border-radius: 5px; overflow: hidden; }
    .gt-bar-fill { height: 100%; background: var(--gt-accent); border-radius: 5px; }
    .gt-bar-value { width: 32px; text-align: right; font-family: var(--gt-font-mono); font-size: 0.8rem; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg gt-navbar sticky-top py-3">
    <div class="container-fluid gt-container-fluid px-3 px-md-4">
      <a class="navbar-brand gt-brand" href="dashboard.html">
        <i class="bi bi-joystick" style="color: var(--gt-accent);"></i>
        GameTracker <span class="gt-brand-mark">Pro</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gtNavContent"
              aria-controls="gtNavContent" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="gtNavContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Meu Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explorar</a></li>
          <li class="nav-item"><a class="nav-link active" href="reports.html">Relatórios</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <button class="gt-theme-toggle" type="button" onclick="toggleTheme()" aria-label="Alternar tema claro/escuro" title="Alternar tema">
            <i class="bi bi-sun"></i>
          </button>
          <button class="btn btn-outline-danger" onclick="logout()">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid gt-container-fluid px-3 px-md-4 py-4">

    <section class="gt-hud-strip d-flex flex-wrap mb-4" aria-label="Resumo">
      <div class="gt-hud-item flex-fill">
        <div class="gt-hud-value gt-mono" id="rep-total">0</div>
        <div class="gt-hud-label">Jogos catalogados</div>
      </div>
      <div class="gt-hud-item flex-fill">
        <div class="gt-hud-value gt-mono is-finished" id="rep-taxa-conclusao">0%</div>
        <div class="gt-hud-label">Taxa de conclusão</div>
      </div>
      <div class="gt-hud-item flex-fill">
        <div class="gt-hud-value gt-mono" id="rep-media-geral">-</div>
        <div class="gt-hud-label">Nota média geral</div>
      </div>
      <div class="gt-hud-item flex-fill">
        <div class="gt-hud-value gt-mono is-favorite" id="rep-favoritos">0</div>
        <div class="gt-hud-label">Favoritos</div>
      </div>
    </section>

    <div id="reports-empty" class="text-center py-5 d-none">
      <i class="bi bi-bar-chart fs-1 text-white-50 d-block mb-3"></i>
      <p class="text-white-50 mb-0">Adicione jogos ao seu catálogo para ver relatórios aqui.</p>
    </div>

    <div id="reports-content" class="row g-4">
      <div class="col-12 col-lg-6">
        <div class="gt-panel p-4">
          <h5 class="gt-display mb-3">Por gênero</h5>
          <div id="rep-genero"></div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="gt-panel p-4">
          <h5 class="gt-display mb-3">Por plataforma</h5>
          <div id="rep-plataforma"></div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="gt-panel p-4">
          <h5 class="gt-display mb-3">Notas médias por categoria</h5>
          <div id="rep-notas"></div>
        </div>
      </div>

      <div class="col-12 col-lg-6">
        <div class="gt-panel p-4">
          <h5 class="gt-display mb-3">Melhor avaliados</h5>
          <ol class="mb-0 ps-3" id="rep-top-jogos"></ol>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/reports.js"></script>
</body>
</html>
