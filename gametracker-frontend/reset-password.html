<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTracker Pro — Redefinir senha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme.js"></script>
</head>
<body>

  <main class="d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">

          <div class="d-flex align-items-center gap-2 mb-4 justify-content-center">
            <i class="bi bi-joystick fs-3" style="color: var(--gt-accent);"></i>
            <span class="gt-brand fs-4">GameTracker <span class="gt-brand-mark">Pro</span></span>
          </div>

          <div class="gt-panel p-4 p-md-5">
            <h4 class="gt-display mb-1 text-center">Redefinir senha</h4>
            <p class="text-white-50 small text-center mb-4">Escolha uma nova senha para sua conta.</p>

            <div id="reset-form-wrapper">
              <div class="mb-3">
                <label for="reset-new-password" class="form-label small text-white-50">Nova senha</label>
                <input type="password" class="form-control" id="reset-new-password" placeholder="••••••••">
              </div>
              <div class="mb-3">
                <label for="reset-confirm-password" class="form-label small text-white-50">Confirmar nova senha</label>
                <input type="password" class="form-control" id="reset-confirm-password" placeholder="••••••••">
              </div>
              <div class="form-text mb-3">Mínimo 8 caracteres, com maiúscula, minúscula, número e caractere especial (@$!%*?&amp;).</div>

              <div class="gt-field-error text-danger small mb-3 d-none" id="reset-error"></div>

              <button type="button" class="btn btn-gt-primary w-100 py-2" id="btn-reset-password">Redefinir senha</button>
            </div>

            <div id="reset-success-wrapper" class="d-none text-center">
              <i class="bi bi-check-circle fs-1 mb-3 d-block" style="color: var(--gt-success);"></i>
              <p class="mb-4">Senha redefinida com sucesso!</p>
              <a href="index.html" class="btn btn-gt-primary w-100 py-2">Ir para o login</a>
            </div>

            <div id="reset-invalid-wrapper" class="d-none text-center">
              <i class="bi bi-x-circle fs-1 mb-3 d-block" style="color: var(--gt-danger);"></i>
              <p class="mb-4">Este link é inválido ou já expirou.</p>
              <a href="index.html" class="btn btn-gt-outline w-100 py-2">Voltar ao login</a>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/reset-password.js"></script>
</body>
</html>
