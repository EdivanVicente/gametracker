<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameTracker Pro — Meu Perfil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme.js"></script>

  <script src="assets/js/auth-check.js"></script>
</head>
<body>

  <nav class="navbar navbar-expand-lg gt-navbar sticky-top py-3">
    <div class="container-fluid gt-container-fluid px-3 px-md-4">
      <a class="navbar-brand gt-brand" href="dashboard.html">
        <i class="bi bi-joystick" style="color: var(--gt-accent);"></i>
        GameTracker <span class="gt-brand-mark">Pro</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#gtNavContent"
              aria-controls="gtNavContent" aria-expanded="false" aria-label="Abrir menu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="gtNavContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
          <li class="nav-item"><a class="nav-link" href="dashboard.html">Meu Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="explore.html">Explorar</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Relatórios</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2">
          <button class="gt-theme-toggle" type="button" onclick="toggleTheme()" aria-label="Alternar tema claro/escuro" title="Alternar tema">
            <i class="bi bi-sun"></i>
          </button>
          <button class="btn btn-outline-danger" onclick="logout()">Sair</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="container-fluid gt-container-fluid px-3 px-md-4 py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="gt-panel p-4 p-md-5 text-center">

          <div class="mb-4 position-relative d-inline-block">
            <div id="profile-avatar-preview"
                 class="rounded-circle d-flex align-items-center justify-content-center mx-auto overflow-hidden"
                 style="width: 120px; height: 120px; background-color: var(--gt-surface-raised); border: 2px solid var(--gt-border);">
              <i class="bi bi-person fs-1 text-white-50"></i>
            </div>
            <label for="profile-avatar-input"
                   class="btn btn-gt-primary rounded-circle d-flex align-items-center justify-content-center position-absolute"
                   style="width: 36px; height: 36px; bottom: 0; right: 0; cursor: pointer;"
                   title="Alterar foto">
              <i class="bi bi-camera"></i>
            </label>
            <input type="file" id="profile-avatar-input" accept="image/*" class="d-none">
          </div>

          <h3 class="gt-display mb-1" id="profile-name-display">—</h3>
          <p class="text-white-50 mb-4" id="profile-email-display">—</p>

          <div class="text-start">
            <div class="mb-3">
              <label for="profile-name-input" class="form-label small text-white-50">Nome de exibição</label>
              <input type="text" class="form-control" id="profile-name-input" placeholder="Como você quer ser chamado?" maxlength="120">
            </div>

            <div class="mb-4">
              <label class="form-label small text-white-50">E-mail</label>
              <input type="email" class="form-control" id="profile-email-input" disabled>
            </div>

            <div class="d-flex justify-content-between align-items-center p-3 mb-4 rounded" style="background-color: var(--gt-surface-raised); border: 1px solid var(--gt-border);">
              <span class="small text-white-50"><i class="bi bi-calendar-check me-2"></i>Membro desde</span>
              <span class="gt-mono" id="profile-joined-date">—</span>
            </div>

            <div class="gt-field-error text-danger small mb-3 d-none" id="profile-error"></div>
            <div class="text-success small mb-3 d-none" id="profile-success">Perfil atualizado com sucesso!</div>

            <button type="button" class="btn btn-gt-primary w-100 py-2" id="btn-save-profile">Salvar alterações</button>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/profile.js"></script>
</body>
</html>
